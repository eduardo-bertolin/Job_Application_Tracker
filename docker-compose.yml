services:
  postgres:
    image: postgres:16-alpine
    container_name: jat_postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: job_tracker_dev
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
